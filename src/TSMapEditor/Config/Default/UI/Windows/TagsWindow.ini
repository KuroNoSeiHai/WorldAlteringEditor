[TagsWindow]
$CC00=lblDescription:XNALabel
$CC01=lblTags:XNALabel
$CC02=btnNewTag:EditorButton
$CC03=btnCloneTag:EditorButton
$CC04=btnDeleteTag:EditorButton
$CC05=lbTags:EditorListBox
$CC06=lblSelectedTag:XNALabel
$CC07=lblName:XNALabel
$CC08=tbName:EditorTextBox
$CC09=lblTrigger:XNALabel
$CC10=selTrigger:EditorPopUpSelector
$CC11=lblPersistence:XNALabel
$CC12=ddPersistence:XNADropDown
$Width=getRight(tbName) + EMPTY_SPACE_SIDES
$Height=getBottom(lbTags) + EMPTY_SPACE_BOTTOM
HasCloseButton=true

[lblDescription]
$X=EMPTY_SPACE_SIDES
$Y=EMPTY_SPACE_TOP
$Text=translate(Tags allow triggers to be attached to objects and allow triggers to fire.@@The editor's Triggers window normally takes care of Tags for you.@Only touch Tags manually if you know what you are doing!)

[lblTags]
$X=EMPTY_SPACE_SIDES
$Y=getBottom(lblDescription) + EMPTY_SPACE_TOP
FontIndex=1
$Text=translate(Tags:)

[btnNewTag]
$X=getX(lblTags)
$Y=getBottom(lblTags) + VERTICAL_SPACING
$Width=200
$Text=translate(New Tag)

[btnCloneTag]
$X=getX(lblTags)
$Y=getBottom(btnNewTag) + VERTICAL_SPACING
$Width=getWidth(btnNewTag)
$Text=translate(Clone Tag)

[btnDeleteTag]
$X=getX(lblTags)
$Y=getBottom(btnCloneTag) + VERTICAL_SPACING
$Width=getWidth(btnNewTag)
$Text=translate(Delete Tag)

[lbTags]
$X=getX(lblTags)
$Y=getBottom(btnDeleteTag) + VERTICAL_SPACING
$Width=getWidth(btnNewTag)
$Height=300

[lblSelectedTag]
$X=getRight(btnNewTag) + (HORIZONTAL_SPACING * 2)
$Y=getY(lblTags)
FontIndex=1
$Text=translate(Selected Tag:)

[lblName]
$X=getX(lblSelectedTag)
$Y=getBottom(lblSelectedTag) + EMPTY_SPACE_TOP
$Text=translate(Name:)

[tbName]
$X=getX(lblSelectedTag) + 100
$Y=getY(lblName) - 1
$Width=280

[lblTrigger]
$X=getX(lblName)
$Y=getBottom(tbName) + VERTICAL_SPACING + 1
$Text=translate(Trigger:)

[selTrigger]
$X=getX(tbName)
$Y=getY(lblTrigger) - 1
$Width=getWidth(tbName)

[lblPersistence]
$X=getX(lblName)
$Y=getBottom(selTrigger) + VERTICAL_SPACING + 1
$Text=translate(Repeating:)

[ddPersistence]
$X=getX(tbName)
$Y=getY(lblPersistence) - 1
$Width=getWidth(tbName)
