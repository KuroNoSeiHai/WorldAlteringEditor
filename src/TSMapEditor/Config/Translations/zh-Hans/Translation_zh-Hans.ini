ScriptAction.Shroud Map for Time Interval.Description=一段时间后重置地图黑幕。
ScriptAction.Reveal Map for Time Interval.Name=显示全地图
ScriptAction.Reveal Map for Time Interval.Description=一段时间后显示全地图。
ScriptAction.Delete Team Members.Name=删除小队成员
ScriptAction.Delete Team Members.Description=删除该小队所有成员。
ScriptAction.Clear Global.Name=清除全局变量
ScriptAction.Clear Global.Description=清除指定全局变量。
ScriptAction.Set Local.Name=设置局部变量
ScriptAction.Set Local.Description=设置指定局部变量。
ScriptAction.Clear Local.Name=清除局部变量
ScriptAction.Clear Local.Description=清除指定局部变量。
ScriptAction.Unpanic.Name=停止恐慌
ScriptAction.Unpanic.Description=使所有小队成员停止惊慌。
ScriptAction.Change Facing.Name=改变朝向
ScriptAction.Change Facing.Description=强制小队成员面向一个特定的方向。
ScriptAction.Change Facing.Option0.PresetText=北 (右上↗)
ScriptAction.Change Facing.Option1.PresetText=东北 (右→)
ScriptAction.Change Facing.Option2.PresetText=东 (右下↘)
ScriptAction.Change Facing.Option3.PresetText=东南 (下↓)
ScriptAction.Change Facing.Option4.PresetText=南 (左下↙)
ScriptAction.Change Facing.Option5.PresetText=西南 (左←)
ScriptAction.Change Facing.Option6.PresetText=西 (左上↖)
ScriptAction.Change Facing.Option7.PresetText=西北 (上↑)
ScriptAction.Wait Until Fully Loaded.Name=等待到满载
ScriptAction.Wait Until Fully Loaded.Description=等待运输单位完全装载完毕。运载步兵时可以用在14,0之后，运载车辆时不要使用！
ScriptAction.Unload Truck (TRUCKB to TRUCKA).Name=卡车卸载 (TRUCKB to TRUCKA)
ScriptAction.Unload Truck (TRUCKB to TRUCKA).Description=让成员中所有TRUCKB变为TRUCKA。此逻辑基本等同于ares的变形逻辑，不仅会改变外观，还会改变绝大多数单位属性。AI触发条件只会考虑初始单位类型。
ScriptAction.Load Truck (TRUCKA to TRUCKB).Name=卡车装载 (TRUCKA to TRUCKB)
ScriptAction.Load Truck (TRUCKA to TRUCKB).Description=让成员中所有TRUCKA变为TRUCKB。此逻辑基本等同于ares的变形逻辑，不仅会改变外观，还会改变绝大多数单位属性。AI触发条件只会考虑初始单位类型。
ScriptAction.Attack Enemy Structure.Name=*攻击敌方建筑物
ScriptAction.Attack Enemy Structure.Description=攻击指定建筑。参数为从0开始的建筑序号+系数。详见AI教程。(工程师为占领、间谍为渗透、突击者为清驻兵、海军可用此指令攻击陆地建筑)
ScriptAction.Move to Enemy Structure.Name=*移动到敌方建筑物
ScriptAction.Move to Enemy Structure.Description=移动到指定敌方或中立建筑附近。参数计算方法同上。
ScriptAction.Scout.Name=侦察
ScriptAction.Scout.Description=小队会侦察玩家未探索的区域。如果要持续侦查，应当循环执行此脚本。(遭遇战无效)
ScriptAction.Register Success.Name=*任务执行成功
ScriptAction.Register Success.Description=小队每执行一次49号指令，都会在该AITrigger中增加AITriggerSuccessWeightDelta的权重。如果被消灭之前没能执行49号指令，则减少AITriggerFailureWeightDelta*AITriggerTrackRecordCoefficient的权重。
ScriptAction.Flash.Name=闪烁
ScriptAction.Flash.Description=闪烁小队一段时间。
ScriptAction.Play Animation.Name=播放动画
ScriptAction.Play Animation.Description=在每个小队单位上播放动画。
ScriptAction.Display Talk Bubble.Name=对话气泡
ScriptAction.Display Talk Bubble.Description=在小队第一个单位上显示对话气泡。
ScriptAction.Display Talk Bubble.Option0.PresetText=无
ScriptAction.Display Talk Bubble.Option1.PresetText=星号 (*)
ScriptAction.Display Talk Bubble.Option2.PresetText=问号 (?)
ScriptAction.Display Talk Bubble.Option3.PresetText=叹号 (!)
ScriptAction.Gather at Enemy (Ares Improved).Name=*在敌人基地附近集合 (Ares 强化)
ScriptAction.Gather at Enemy (Ares Improved).Description=在敌方基地安全距离外集合。数值参数的正负将影响Rulesmd全局中安全距离 (AISafeDistance=) 的伸长或缩短。
ScriptAction.Gather at Base (Ares Improved).Name=*在友方基地附近集合 (Ares 强化)
ScriptAction.Gather at Base (Ares Improved).Description=在己方基地一定距离外集合。数值参数的正负将影响Rulesmd全局中「友军基地」安全距离 (AIFriendlyDistance=，不存在这条则用AISafeDistance=) 的伸长或缩短。
ScriptAction.Iron Curtain (Ares Improved).Name=*铁幕 (Ares 强化)
ScriptAction.Iron Curtain (Ares Improved).Description=请求小队所属方对当前小队使用超级武器，默认为铁幕。数值参数决定AI使用哪一组超武（对应SW.Group=，默认为0）。
ScriptAction.ChronoSphere Team to Building.Name=*超时空传送至建筑
ScriptAction.ChronoSphere Team to Building.Description=如果超时空传送就绪，则传送该小队至指定建筑物，参数同46号指令。
ScriptAction.ChronoSphere Team to target Type.Name=*超时空传送至目标
ScriptAction.ChronoSphere Team to target Type.Description=如果超时空传送就绪，则传送该小队至指定类别，参数同0号指令。
ScriptAction.ChronoSphere Team to target Type.Option0.PresetText=无差别 (任何目标)
ScriptAction.ChronoSphere Team to target Type.Option1.PresetText=任何目标([VehicleTypes]/[AircraftTypes]/[InfantryTypes]/[BuildingTypes])(Aircraft类无法执行此项。)
ScriptAction.ChronoSphere Team to target Type.Option2.PresetText=建筑物([BuildingTypes])
ScriptAction.ChronoSphere Team to target Type.Option3.PresetText=资源类([BuildingTypes]/[VehicleTypes]/[AircraftTypes],Storag>0)
ScriptAction.ChronoSphere Team to target Type.Option4.PresetText=步兵([InfantryTypes])
ScriptAction.ChronoSphere Team to target Type.Option5.PresetText=载具([VehicleTypes]/[AircraftTypes])
ScriptAction.ChronoSphere Team to target Type.Option6.PresetText=工厂([BuildingTypes],Factory=)
ScriptAction.ChronoSphere Team to target Type.Option7.PresetText=防御建筑([BuildingTypes],Primary=)
ScriptAction.ChronoSphere Team to target Type.Option8.PresetText=同0(同样是空项)
ScriptAction.ChronoSphere Team to target Type.Option9.PresetText=电厂([BuildingTypes],BuildCat=Power)
ScriptAction.ChronoSphere Team to target Type.Option10.PresetText=可驻军建筑([BuildingTypes],CanOccupyFire=yes)
ScriptAction.ChronoSphere Team to target Type.Option11.PresetText=中立科技建筑([BuildingTypes],NeedsEngineer=yes)
ScriptAction.Move to Friendly Structure.Name=*移动到己方建筑
ScriptAction.Move to Friendly Structure.Description=移动到友方的特定建筑，参数同46号指令。
ScriptAction.Attack structure at waypoint.Name=攻占路径点建筑
ScriptAction.Attack structure at waypoint.Description=攻击占据该路径点的建筑物。AI间谍类单位(渗透、占领、C4、驻扎、突击者)能够正常攻击、驻扎建筑，人类玩家除C4外无法正常使用。如果路径点上没有建筑，则会跳过该脚本。如果该建筑是友军，则会在原地锁定直至对象消失，人类玩家单位会攻击友军。
ScriptAction.Enter Grinder.Name=进入回收厂
ScriptAction.Enter Grinder.Description=让小队进入该所属方就近的部队回收厂。小队会解散，单位全部变为Eaten状态。如果最近的回收厂无法到达，则会呆在原地。如果所属方没有回收厂，会跳过该脚本。
ScriptAction.Occupy Tank Bunker.Name=*进入坦克碉堡
ScriptAction.Occupy Tank Bunker.Description=让小队的每个单位进入空的坦克碉堡，剩余单位会继续执行脚本。
ScriptAction.Enter bio reactor.Name=*进入生化反应炉
ScriptAction.Enter bio reactor.Description=让小队进入生化反应炉。小队会解散，单位全部变为Capture状态。即使所属方有多个生化反应炉，小队也只会进入其中一个，剩余单位会变为Guard状态。
ScriptAction.Occupy Battle Bunker.Name=进入战斗碉堡(经常不灵)
ScriptAction.Occupy Battle Bunker.Description=让小队进入战斗碉堡。可驻扎单位会解散，全部变为Capture状态。所有碉堡被驻扎后，剩余单位会变为Guard状态。从碉堡中撤离的步兵会继续寻找下一个碉堡驻扎。不可驻扎单位会继续执行后续脚本。
ScriptAction.Garrison Structure.Name=进入可驻军建筑
ScriptAction.Garrison Structure.Description=让小队进驻中立建筑物或战斗碉堡。可驻扎单位会解散，全部变为Capture状态。所有建筑被驻扎后，剩余单位会变为Guard状态。但如果有一个不可到达的可驻军建筑，剩余单位会原地发呆并维持Capture状态。在特殊情况下，这会导致游戏特别卡顿。从建筑中撤离的步兵会继续寻找下一个建筑驻扎。不可驻扎单位会继续执行后续脚本。(即使是用来占己方碉堡，也比63更稳定……)
ScriptAction.Auxiliary Power [Ares].Name=给予额外电力 [Ares]
ScriptAction.Auxiliary Power [Ares].Description=给予小队所属方一定数值电力。电量可以为负。
ScriptAction.Kill Drivers [Ares].Name=杀死驾驶员 [Ares]
ScriptAction.Kill Drivers [Ares].Description=杀死小队中载具的驾驶员。所有被影响的单位都会转变成Special所属方。
ScriptAction.Take Vehicles [Ares].Name=劫车 [Ares]
ScriptAction.Take Vehicles [Ares].Description=这支小队里所有带有CanDrive=yes或者VehicleThief=yes的步兵将被分配到他们能驾驶或者去劫持的最接近他们的车辆。如果这支小队的步兵劫持车辆，会让这辆车离开车辆的队伍。
ScriptAction.Convert Type [Ares].Name=转换类型 [Ares]
ScriptAction.Convert Type [Ares].Description=如果已经设置，则将此小队的成员都更改为各自的脚本类型（对应Convert.Script=）。没有设置这个标记的单位不受到影响。
ScriptAction.Sonar Reveal [Ares].Name=隐形现身 [Ares]
ScriptAction.Sonar Reveal [Ares].Description=小队中隐形的成员将在接下来的指定帧数内无法进入隐形状态。若填0，将立即恢复隐形。
ScriptAction.Disable Weapons [Ares].Name=禁用武器 [Ares]
ScriptAction.Disable Weapons [Ares].Description=小队中的所有成员将在接下来的指定帧数内无法开火。若填0，将可以立即开火。.


