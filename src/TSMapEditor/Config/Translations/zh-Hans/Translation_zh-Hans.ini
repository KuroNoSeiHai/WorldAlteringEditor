; *************************************************
;               Trigger Event Types
; *************************************************

TriggerEventType.No Event.Name=-无事件-
TriggerEventType.No Event.Description=空事件，永远也不会满足。
TriggerEventType.Entered By.Name=被进入
TriggerEventType.Entered By.Description=当所属方步兵或载具进入关联的对象时，此事件被满足。此触发的标签可关联到一个建筑或单元标记上。可使用-1代表任意所属方。
TriggerEventType.Spied Upon.Name=被渗透(无效)
TriggerEventType.Spied Upon.Description=当间谍进入关联的建筑，此事件被满足。
TriggerEventType.Thieved By.Name=被偷窃(无效)
TriggerEventType.Thieved By.Description=当一名间谍偷窃指定所属方的金钱时，此事件被满足。
TriggerEventType.Discovered by Player.Name=被玩家发现
TriggerEventType.Discovered by Player.Description=当关联的对象被玩家发现时，此事件被满足。被发现意味着从黑幕中暴露。不要在多人地图中使用。
TriggerEventType.House Discovered.Name=所属方被发现
TriggerEventType.House Discovered.Description=当特定所属方的任一单位或建筑被玩家发现时，此事件被满足。被发现意味着从黑幕中暴露。不要在多人地图中使用。
TriggerEventType.Attacked by Any House.Name=被任一所属方攻击
TriggerEventType.Attacked by Any House.Description=当关联的对象受到任一所属方攻击(需要造成伤害)时，此事件被满足。无来源伤害无法触发，如碎片伤害。对象直接被该攻击摧毁也会触发。
TriggerEventType.Destroyed by Any House.Name=被任一所属方摧毁
TriggerEventType.Destroyed by Any House.Description=当关联的对象被摧毁时，此事件被满足。无来源伤害无法触发，如碎片伤害；工程师占领、变卖、心控不会触发。更推荐使用事件48 '被任何事物摧毁'来代替。
TriggerEventType.Any Event.Name=任何事件
TriggerEventType.Any Event.Description=这个事件永远满足，单独使用时必定会触发事件。不要将其用于重复触发。
TriggerEventType.All Units Destroyed.Name=单位全部被摧毁
TriggerEventType.All Units Destroyed.Description=当特定所属方的所有「单位(车辆与步兵，不包括飞行器)」被摧毁时，此事件被满足。单位如果全部在建筑中或非该所属方的载具中，或寄生单位正在寄生时，此事件也会被满足。中立对象如平民不会被算入判定条件中。
TriggerEventType.All Buildings Destroyed.Name=建筑全部被摧毁
TriggerEventType.All Buildings Destroyed.Description=当特定所属方的所有「建筑」被摧毁时，此事件被满足。Insignificant=yes建筑不会被算入判定条件中。常使用在游戏的结束条件中。
TriggerEventType.All Objects Destroyed.Name=所有对象全部被摧毁
TriggerEventType.All Objects Destroyed.Description=当特定所属方的所有「对象(车辆、步兵与建筑，不包括飞行器)」被摧毁时，此事件被满足。所有对象如果全部在平民建筑中或非该所属方的载具中，或寄生单位正在寄生时，此事件也会被满足。Insignificant=yes的「建筑」不会被算入判定条件中。常使用在游戏的结束条件中。
TriggerEventType.Credits Exceed.Name=金钱超过
TriggerEventType.Credits Exceed.Description=当触发所属方的金钱超过指定值时，此事件被满足。
TriggerEventType.Elapsed Time.Name=流逝时间
TriggerEventType.Elapsed Time.Description=当流逝的时间达到特定值时此事件被满足(游戏中1秒=15帧)。当触发被允许时计时器初始化；若触发是重复的，时间达到指定值时，计时器复位。若还有变量事件(27%128%136%137)，则计时器从所有变量事件均满足时才复位。
TriggerEventType.Timer Expired.Name=计时器时间已到
TriggerEventType.Timer Expired.Description=当全局的任务计时器(显示在屏幕右下角)倒计时为零时此事件被满足。
TriggerEventType.Destroyed, Buildings, #.Name=建筑被摧毁X个
TriggerEventType.Destroyed, Buildings, #.Description=当触发所属方的特定数量的「建筑」被摧毁时，此事件被满足。不计入Insignificant=yes或DontScore=yes的建筑。
TriggerEventType.Destroyed, Units, #.Name=单位被摧毁X个
TriggerEventType.Destroyed, Units, #.Description=当触发所属方的特定数量的「单位(车辆、步兵与飞行器)」被摧毁时，此事件被满足。不计入DontScore=yes的单位，但计入Insignificant=yes的。
TriggerEventType.No Factories Left.Name=不再有工厂
TriggerEventType.No Factories Left.Description=当触发所属方没有生产建筑(如基地、兵营等有Factory=属性的建筑)时，此事件被满足。
TriggerEventType.Civilians Evacuated.Name=平民撤离(无效)
TriggerEventType.Civilians Evacuated.Description=当平民被撤离时(离开地图)此事件被满足。
TriggerEventType.Built Building Type.Name=建造了特定类型的建筑
TriggerEventType.Built Building Type.Description=当触发所属方建造指定类型的「建筑」时此事件被满足。该事件满足后恒成立，而不是造一个激活一次。
TriggerEventType.Built Unit Type.Name=生产了特定类型的载具
TriggerEventType.Built Unit Type.Description=当触发所属方生产指定类型的「载具(包括Jumpjet直升机)」时此事件被满足。该事件满足后恒成立，而不是造一个激活一次。
TriggerEventType.Built Infantry Type.Name=训练了特定类型的步兵
TriggerEventType.Built Infantry Type.Description=当触发所属方训练指定类型的「步兵」时此事件被满足。该事件满足后恒成立，而不是造一个激活一次。
TriggerEventType.Built Aircraft Type.Name=生产了特定类型的飞机
TriggerEventType.Built Aircraft Type.Description=当触发所属方生产指定类型的「飞行器(不包括Jumpjet直升机)」时此事件被满足。该事件满足后恒成立，而不是造一个激活一次。
TriggerEventType.Team Leaves Map.Name=作战小队离开地图
TriggerEventType.Team Leaves Map.Description=当特定的作战小队离开地图时此事件被满足，若作战小队被摧毁则不会触发。就算作战小队只剩一个成员但离开了地图，事件也将被触发。
TriggerEventType.Zone Entry By.Name=进入某区域
TriggerEventType.Zone Entry By.Description=当特定所属方的一个单位进入此触发关联的「仅一个」单元标记划定的「区域」时，此事件被满足。
TriggerEventType.Crosses Horizontal Line.Name=越过水平线
TriggerEventType.Crosses Horizontal Line.Description=当特定所属方的单位越过触发放置单元标记所在的水平线(西北-东南)时，此事件被满足。此触发事件必须放置于一个单元中。
TriggerEventType.Crosses Vertical Line.Name=越过垂直线
TriggerEventType.Crosses Vertical Line.Description=当特定所属方的单位越过触发放置单元标记所在的垂直线(东北-西南)时，此事件被满足。此触发事件必须放置于一个单元中。
TriggerEventType.Global Is Set.Name=全局变量被设置
TriggerEventType.Global Is Set.Description=当指定的全局变量被设置时，此事件被满足。参数为Rules(md)中[VariableNames]里的ID。
TriggerEventType.Global Is Clear.Name=全局变量被清除
TriggerEventType.Global Is Clear.Description=当指定的全局变量被清除时，此事件被满足。参数为Rules(md)中[VariableNames]里的ID。
TriggerEventType.Destroyed by Anything [Not Infiltrate].Name=被任何事物摧毁(不包括渗透)
TriggerEventType.Destroyed by Anything [Not Infiltrate].Description=当关联的对象被摧毁、占领、心控或变卖时，此事件被满足。不包括该对象渗透入建筑或单位而消失的情况。
TriggerEventType.Low Power.Name=电力不足
TriggerEventType.Low Power.Description=当特定所属方电力低于100%时，触发此事件。
TriggerEventType.Bridge Destroyed.Name=桥梁被摧毁
TriggerEventType.Bridge Destroyed.Description=当特定的桥梁被摧毁(桥梁出现无法通过的缺口)时，此事件被满足。此触发须用单元标记放置在目标桥梁的下方(只能放置一个单元标记)。
TriggerEventType.Building Exists.Name=特定建筑存在
TriggerEventType.Building Exists.Description=当特定的建筑(属于触发所属方)出现于地图上时，此事件被满足。此建筑可以是以前就有的或由基地建造的，参数为[BuildingTypes]里的ID。
TriggerEventType.Selected by Player.Name=被玩家选中
TriggerEventType.Selected by Player.Description=当关联对象被玩家选中时，此事件被满足。仅使用于单人任务中。首次启动后，若对象受到任何「扰动」(移动、受到伤害、被选中等...)，也会被满足。
TriggerEventType.Comes Near Waypoint.Name=到达路径点附近
TriggerEventType.Comes Near Waypoint.Description=当关联对象到达特定的路径点附近时，此事件被满足。范围大约是一个直径为11格的圆形。首次启动后，若对象受到任何「扰动」(移动、受到伤害、被选中等...)，也会被满足。
TriggerEventType.Enemy in Spotlight.Name=敌人进入探照灯
TriggerEventType.Enemy in Spotlight.Description=当一个敌单位进入关联建筑投射的探照灯照明区时，此事件被满足。首次启动后，若对象受到任何「扰动」(移动、受到伤害、被选中等...)，也会被满足。
TriggerEventType.Local Is Set.Name=局部变量被设置
TriggerEventType.Local Is Set.Description=当指定的局部变量被设置(1)时，此事件被满足。
TriggerEventType.Local Is Clear.Name=局部变量被清除
TriggerEventType.Local Is Clear.Description=当指定的局部变量被清除(0)时，此事件被满足。
TriggerEventType.First Damaged (Combat Only).Name=首次受损(仅战斗伤害)
TriggerEventType.First Damaged (Combat Only).Description=关联对象初次受到「战斗」(有来源的)造成的伤害时，此事件被满足。首次启动后，若单位受到任何「扰动」(移动、受到伤害、被选中等...)，也会被满足。
TriggerEventType.Half Health (Combat Only).Name=一半生命值(仅战斗伤害)
TriggerEventType.Half Health (Combat Only).Description=关联对象受到「战斗」(有来源的)伤害而只剩一半生命值时，此事件被满足。首次启动后，若单位受到任何「扰动」(移动、受到伤害、被选中等...)，也会被满足。
TriggerEventType.Quarter Health (Combat Only).Name=红色生命值(仅战斗伤害)
TriggerEventType.Quarter Health (Combat Only).Description=关联对象受到「战斗」(有来源的)伤害使得生命值变为红色时，此事件被满足。首次启动后，若单位受到任何「扰动」(移动、受到伤害、被选中等...)，也会被满足。
TriggerEventType.First Damaged (Any Source).Name=首次受损(任何伤害来源)
TriggerEventType.First Damaged (Any Source).Description=关联对象初次受到「任何来源」(包括碎片)造成的伤害时，此事件被满足。首次启动后，若单位受到任何「扰动」(移动、受到伤害、被选中等...)，也会被满足。
TriggerEventType.Half Health (Any Source).Name=一半生命值(任何伤害来源)
TriggerEventType.Half Health (Any Source).Description=关联对象受到「任何来源」(包括碎片)的伤害而只剩一半生命值时，此事件被满足。首次启动后，若单位受到任何「扰动」(移动、受到伤害、被选中等...)，也会被满足。
TriggerEventType.Quarter Health (Any Source).Name=红色生命值(任何伤害来源)
TriggerEventType.Quarter Health (Any Source).Description=关联对象受到「任何来源」(包括碎片)的伤害使得生命值变为红色时，此事件被满足。首次启动后，若单位受到任何「扰动」(移动、受到伤害、被选中等...)，也会被满足。
TriggerEventType.Attacked By.Name=被特定所属方攻击
TriggerEventType.Attacked By.Description=当受到特定所属方某些单位的攻击时，此事件被满足。若物体直接被该攻击摧毁则无法触发。
TriggerEventType.Ambient Light Below.Name=环境照明 <=
TriggerEventType.Ambient Light Below.Description=当环境亮度(Ambient)低于某一指定值时，此事件被满足。填正整数，是[Lighting]中对应数值的一百倍，如50对应0.5。可以检测超级武器引发的亮度变化。
TriggerEventType.Ambient Light Above.Name=环境照明 >=
TriggerEventType.Ambient Light Above.Description=当环境亮度(Ambient)高于某一指定值时，此事件被满足。填正整数，是[Lighting]中对应数值的一百倍，如50对应0.5。可以检测超级武器引发的亮度变化。
TriggerEventType.Elapsed Scenario Time.Name=流逝游戏时间
TriggerEventType.Elapsed Scenario Time.Description=在游戏开始后特定的时间（秒），此事件被满足。
TriggerEventType.Destroyed by Anything.Name=被任何事物摧毁
TriggerEventType.Destroyed by Anything.Description=当关联对象被任何事物摧毁、占领、心控或变卖时，此事件被满足。可以用于有子机的单位。
TriggerEventType.Picked Up Crate.Name=关联对象拾取升级工具箱
TriggerEventType.Picked Up Crate.Description=当关联对象拾得工具箱时，此事件被满足。首次启动后，若单位受到任何「扰动」(移动、受到伤害、被选中等...)，也会被满足。
TriggerEventType.Picked Up Crate (Any).Name=任何单位拾得工具箱
TriggerEventType.Picked Up Crate (Any).Description=当任何单位拾得工具箱时，此事件被满足。该事件满足后恒成立，不要用于重复触发。
TriggerEventType.Random Delay.Name=随机延时
TriggerEventType.Random Delay.Description=进行随机延时，时间值(秒)介于指定值的 50% 到 150%。联机使用容易RE(重新连线错误)。若还有变量事件(27%128%136%137)，则计时器从所有变量事件均满足时才初始化。
TriggerEventType.Credits Below.Name=金钱低于
TriggerEventType.Credits Below.Description=当触发所属方的金钱低于指定值时，此事件被满足。
TriggerEventType.Spy Enters As House.Name=被间谍伪装成特定所属方并进入(无效)
TriggerEventType.Spy Enters As House.Description=关联建筑被伪装成特定所属方的间谍单位进入时，此事件被满足。
TriggerEventType.Spy Enters As Infantry.Name=被间谍伪装成特定步兵并进入(无效)
TriggerEventType.Spy Enters As Infantry.Description=关联建筑被伪装成特定步兵类型的间谍单位进入时，此事件被满足。
TriggerEventType.Destroyed Units, Naval.Name=海军单位全部被摧毁
TriggerEventType.Destroyed Units, Naval.Description=当特定所属方的所有海军单位(不包括两栖单位)被摧毁时，此事件被满足。
TriggerEventType.Destroyed Units, Land.Name=陆军单位全部被摧毁
TriggerEventType.Destroyed Units, Land.Description=当特定所属方的所有陆军单位(包括JumpJet=yes单位、两栖单位、步兵，不包括飞行器)被摧毁时，此事件被满足。
TriggerEventType.Building Does Not Exist.Name=建筑不再存在
TriggerEventType.Building Does Not Exist.Description=当触发所属方的特定的建筑不存在于地图上时，此事件被满足。参数为[BuildingTypes]里的ID。
TriggerEventType.Power Full.Name=电力充足
TriggerEventType.Power Full.Description=当特定所属方的电力达到或超过100%时，此事件被满足。
TriggerEventType.Entered Or Overflown By.Name=被进入或飞越
TriggerEventType.Entered Or Overflown By.Description=当特定所属方的「任何单位」进入或飞越此触发对应标记关联的单元标记时，此事件被满足。
TriggerEventType.TechnoType Exists.Name=科技类型存在
TriggerEventType.TechnoType Exists.Description=当任一所属方「至少」有特定数量的特定「科技类型」时，此事件被满足。此触发计算正在建造中的物体。
TriggerEventType.TechnoType Does Not Exist.Name=科技类型不存在
TriggerEventType.TechnoType Does Not Exist.Description=当该「科技类型」不存在于任一所属方时，此事件被满足。此触发计算正在建造中的物体。
TriggerEventType.Under EM Pulse [Ares].Name=被EMP [Ares]
TriggerEventType.Under EM Pulse [Ares].Description=当关联对象被EMP瘫痪时，此事件被满足。
TriggerEventType.Under EM Pulse by House [Ares].Name=被某所属方EMP [Ares]
TriggerEventType.Under EM Pulse by House [Ares].Description=当特定所属方使用EMP瘫痪关联对象时，此事件被满足。本条优先于62号事件。
TriggerEventType.Removed EM Pulse [Ares].Name=解除EMP [Ares]
TriggerEventType.Removed EM Pulse [Ares].Description=当关联对象的EMP状态被特定所属方解除时，此事件被满足。本条优先于64号事件。
TriggerEventType.Removed EM Pulse by House [Ares].Name=被某所属方解除EMP [Ares]
TriggerEventType.Removed EM Pulse by House [Ares].Description=当关联对象的EMP状态被特定所属方解除时，此事件被满足。本条优先于64号事件。
TriggerEventType.Enemy In Spotlight Now [Ares].Name=敌人正处于探照灯中 [Ares]
TriggerEventType.Enemy In Spotlight Now [Ares].Description=当关联建筑的探照灯照到敌人时，此事件被满足。类似于[35 敌人进入探照灯]，但可以正确重复触发。
TriggerEventType.Driver Killed [Ares].Name=驾驶员被杀害 [Ares]
TriggerEventType.Driver Killed [Ares].Description=当关联对象的驾驶员被杀害时，此事件被满足。
TriggerEventType.Driver Killed By House [Ares].Name=驾驶员被某所属方杀害 [Ares]
TriggerEventType.Driver Killed By House [Ares].Description=当特定所属方杀害关联对象驾驶员时，此事件被满足。本条优先于事件67。
TriggerEventType.Vehicle Taken [Ares].Name=被劫车 [Ares]
TriggerEventType.Vehicle Taken [Ares].Description=当关联对象被劫持时，此事件被满足。
TriggerEventType.Vehicle Taken By House [Ares].Name=被某所属方劫车 [Ares]
TriggerEventType.Vehicle Taken By House [Ares].Description=当特定所属方的驾驶员进入关联对象时，此事件被满足。本条优先于69号事件。
TriggerEventType.Abducted [Ares].Name=被吸收 [Ares]
TriggerEventType.Abducted [Ares].Description=当关联对象被吸收时，此事件被满足。
TriggerEventType.Abducted By House [Ares].Name=被某所属方吸收 [Ares]
TriggerEventType.Abducted By House [Ares].Description=当特定所属方吸收关联对象时，此事件被满足。本条优先于71号事件。
TriggerEventType.Abducts Something [Ares].Name=吸收了单位 [Ares]
TriggerEventType.Abducts Something [Ares].Description=当关联步兵吸收其他单位时，此事件被满足。
TriggerEventType.Abducts Something Of House [Ares].Name=吸收了某所属方单位 [Ares]
TriggerEventType.Abducts Something Of House [Ares].Description=当关联步兵吸收特定所属方单位时，此事件被满足。本条优先于73号事件。
TriggerEventType.Super Weapon Activated [Ares].Name=超级武器被释放 [Ares]
TriggerEventType.Super Weapon Activated [Ares].Description=当触发所属方的特定超级武器释放时，此事件被满足。
TriggerEventType.Super Weapon Deactivated [Ares].Name=超级武器停止工作 [Ares]
TriggerEventType.Super Weapon Deactivated [Ares].Description=当触发所属方的特定超级武器被停止时，此事件被满足。
TriggerEventType.Super Weapon Activated Near Waypoint [Ares].Name=超级武器在特定路径点释放 [Ares]
TriggerEventType.Super Weapon Activated Near Waypoint [Ares].Description=当特定的超级武器在路径点附近释放时，此事件被满足。
TriggerEventType.Reverse Engineered [Ares].Name=科技类型被逆向工程 [Ares]
TriggerEventType.Reverse Engineered [Ares].Description=当触发所属方拥有指定逆向工程的科技类型时，此事件被满足。尊重ReversedAs。
TriggerEventType.Reverse Engineers Anything [Ares].Name=逆向工程任何科技 [Ares]
TriggerEventType.Reverse Engineers Anything [Ares].Description=当关联建筑成功逆向工程「任意」科技类型时，此事件被满足。
TriggerEventType.Reverse Engineers Type [Ares].Name=逆向工程指定类型 [Ares]
TriggerEventType.Reverse Engineers Type [Ares].Description=当关联建筑成功逆向工程「特定」科技类型时，此事件被满足。本条优先于79号事件。
TriggerEventType.House Owns Techno Type [Ares].Name=所属方拥有多于指定科技类型数量 [Ares]
TriggerEventType.House Owns Techno Type [Ares].Description=当触发所属方「至少」有特定数量的特定科技类型时，此事件被满足。
TriggerEventType.House Doesn’t Own Techno Type [Ares].Name=所属方拥有少于指定科技类型数量 [Ares]
TriggerEventType.House Doesn’t Own Techno Type [Ares].Description=当触发所属方「至多」有特定数量的特定科技类型时，此事件被满足。
TriggerEventType.Attacked Or Destroyed By Anybody [Ares].Name=被任何事物攻击或摧毁 [Ares]
TriggerEventType.Attacked Or Destroyed By Anybody [Ares].Description=当关联对象被攻击(即使没有伤害)或摧毁时，此事件被满足。
TriggerEventType.Attacked Or Destroyed By House [Ares].Name=被某所属方攻击或摧毁 [Ares]
TriggerEventType.Attacked Or Destroyed By House [Ares].Description=当关联对象被特定所属方攻击或摧毁时，此事件被满足。本条优先于6号和44号事件。
TriggerEventType.Destroyed By House [Ares].Name=被某所属方摧毁 [Ares]
TriggerEventType.Destroyed By House [Ares].Description=当关联物体被「任意」来自特定所属方的攻击 摧毁时，此事件被满足。本条优先于7号事件。
TriggerEventType.Techno Type Doesn't Exist More Than [Ares].Name=科技类型不多于 [Ares]
TriggerEventType.Techno Type Doesn't Exist More Than [Ares].Description=当特定的科技类型数量「不多于」某一数值时，此事件被满足。
TriggerEventType.All KeepAlives Destroyed [Ares].Name=可存活对象全部被摧毁 [Ares]
TriggerEventType.All KeepAlives Destroyed [Ares].Description=当特定所属方不再拥有可以保持存活(具有KeepAlive=yes属性)的「物体」时，此事件被满足。
TriggerEventType.All KeepAlive Buildings Destroyed [Ares].Name=可存活建筑全部被摧毁 [Ares]
TriggerEventType.All KeepAlive Buildings Destroyed [Ares].Description=当特定所属方不再拥有可以保持存活(具有KeepAlive=yes属性)的「建筑」时，此事件被满足。


; *************************************************
;                Trigger Action Types
; *************************************************

TriggerActionType.No Action.Name=-无行为-
TriggerActionType.No Action.Description=空行为，没作用，可以留着占位。
TriggerActionType.Winner Is.Name=胜利者是...
TriggerActionType.Winner Is.Description=特定的所属方会成为胜利者，游戏会立即结束。其他所属方会显示“任务失败/游戏结束”。
TriggerActionType.Loser Is.Name=失败者是...
TriggerActionType.Loser Is.Description=特定的所属方会成为失败者，游戏会立即结束。其他所属方会显示“任务完成/您胜利了”。
TriggerActionType.Production Begins.Name=生产开始
TriggerActionType.Production Begins.Description=特定的电脑所属方将开始生产单位和建筑。IQ>Production的所属方始终会自动建造，不需要本行为。
TriggerActionType.Create Team.Name=建立作战小队
TriggerActionType.Create Team.Description=建立一个指定的作战小队(归属于小队所属方)。通常会直接从已有单位中招募。如果没有足够的单位来组建小队，AI会通过生产补足(自动建造)。当所有成员就位时，小队即自动建立。
TriggerActionType.Destroy Team.Name=解散作战小队
TriggerActionType.Destroy Team.Description=解散当前存在的所有特定类型的作战小队。小队的单位会保留，继承小队重组属性。
TriggerActionType.All to Hunt.Name=全部游猎
TriggerActionType.All to Hunt.Description=特定的所属方的所有单位进入寻敌(Hunt)模式。他们将搜索并消灭敌人。
TriggerActionType.Reinforcement.Name=援军(作战小队)
TriggerActionType.Reinforcement.Description=创建由指定作战小队组成的援军。小队成员直接重叠刷出，刷兵路径点为小队设置中的路径点。
TriggerActionType.Drop Zone Flare.Name=降落区闪烁(路径点)
TriggerActionType.Drop Zone Flare.Description=在指定路径点显示一个空降舱降落区域动画([AudioVisual] -> DropZoneAnim)。此区域附近的地图也将会显示(范围为 [AudioVisual] -> DropZoneRadius)。
TriggerActionType.Fire Sale.Name=卖掉全部建筑
TriggerActionType.Fire Sale.Description=特定所属方会变卖掉所有建筑(只要art中有Buildup就会变卖，无视Unsellable)，对玩家控制所属方无效，并且单位循环进入寻敌(Hunt)模式。
TriggerActionType.Play Movie.Name=全屏播放影片
TriggerActionType.Play Movie.Description=全屏播放特定影片。游戏在此期间将会暂停，在播放完成后自动恢复正常。
TriggerActionType.Text Trigger.Name=文本触发事件
TriggerActionType.Text Trigger.Description=显示文本内容，参数为CSF文件内的项目。CSF文件需要用CSF编辑器编辑。
TriggerActionType.Destroy Trigger.Name=摧毁触发事件
TriggerActionType.Destroy Trigger.Description=摧毁所有特定触发事件的当前实例。但不会阻止已经被触发完成的实例(包括正在建立中的)。
TriggerActionType.Autocreate Begins.Name=开始自动创建作战小队
TriggerActionType.Autocreate Begins.Description=(无效，不需要设置)特定所属方会开始自动创建。这会使得电脑所属方在它认为合适的时机自动建造作战小队。
TriggerActionType.Change House.Name=更改所属方
TriggerActionType.Change House.Description=更改关联对象到特定的所属方。载具内的载员不受此触发的作用。
TriggerActionType.Allow Win.Name=允许胜利
TriggerActionType.Allow Win.Description=在本游戏中无效！！！
TriggerActionType.Reveal All Map.Name=显示全地图
TriggerActionType.Reveal All Map.Description=为玩家显示全部地图(清除黑幕)。联机使用会导致RE(重新连线错误)。
TriggerActionType.Reveal Around Waypoint.Name=显示路径点周围区域
TriggerActionType.Reveal Around Waypoint.Description=为玩家显示特定路径点周围的一片地图区域。在地形高度较高时，显示的区域会产生偏移，越高越偏上。
TriggerActionType.Reveal Zone of Waypoint.Name=显示路径点的单元区域
TriggerActionType.Reveal Zone of Waypoint.Description=为玩家显示由路径点划定的「区域」中所有的格子。「区域」的定义参见事件24。容易导致问题，请谨慎使用。
TriggerActionType.Play Sound.Name=播放音效
TriggerActionType.Play Sound.Description=播放特定音效。在Sound(md).ini中定义。不能播放会循环的音效(如_Amb开头的音效)。
TriggerActionType.Play Music Theme.Name=播放音乐
TriggerActionType.Play Music Theme.Description=播放特定音乐。在Theme(md).ini中定义。
TriggerActionType.Play Speech.Name=播放语音
TriggerActionType.Play Speech.Description=播放特定语音。在Eva(md).ini中定义。,
TriggerActionType.Force Trigger.Name=强制触发事件
TriggerActionType.Force Trigger.Description=强制特定类型的所有触发事件进行触发，不管触发此事件的条件。不要对该触发本身使用！
TriggerActionType.Timer Start.Name=计时开始
TriggerActionType.Timer Start.Description=启动全局任务计时器。一定时间内可显示的全局计时器有且只有一个。
TriggerActionType.Timer Stop.Name=计时停止
TriggerActionType.Timer Stop.Description=停止全局任务计时器。
TriggerActionType.Timer Extend.Name=计时器计时增加
TriggerActionType.Timer Extend.Description=将全局任务计时器增加指定的时间。(游戏中1秒=15帧)
TriggerActionType.Timer Shorten.Name=计时器计时缩短
TriggerActionType.Timer Shorten.Description=将全局任务计时器减少指定的时间。(游戏中1秒=15帧)时间不会减到 0 以下。
TriggerActionType.Timer Set.Name=计时器时间指定
TriggerActionType.Timer Set.Description=将全局任务计时器设置为指定的时间值。(游戏中1秒=15帧)
TriggerActionType.Global Set.Name=设置全局变量
TriggerActionType.Global Set.Description=设置全局变量(1)。全局变量在Rules(md).ini中的[VariableNames]里定义。全局变量可以是'on/set/true'或'off/clear/false'。
TriggerActionType.Global Clear.Name=清除全局变量
TriggerActionType.Global Clear.Description=清除全局变量(0)。全局变量在Rules(md).ini中的[VariableNames]里定义。全局变量可以是'on/set/true'或'off/clear/false'。
TriggerActionType.Auto Base Building.Name=自动建设基地
TriggerActionType.Auto Base Building.Description=初始化电脑遭遇战模式的建设控制，可以是[ON]或[OFF]状态，单人任务中，一经开启无法关闭。当设为[ON]且电脑所属方无基地节点时，将会像遭遇战模式那样自动进行建设(要确保有建造场)；如果有基地节点，则仍会建造节点对应的建筑。
TriggerActionType.Grow Shroud One Step.Name=逐步延伸黑幕
TriggerActionType.Grow Shroud One Step.Description=增大地图的黑幕(一步一单元格)，需要相应的延伸黑幕INI设置才能使用。
TriggerActionType.Destroy Attached Object.Name=摧毁关联对象
TriggerActionType.Destroy Attached Object.Description=摧毁该触发关联的任何建筑物、桥梁或者单位。摧毁Immune=yes的对象会导致游戏卡死。
TriggerActionType.Add One-Time Special Weapon.Name=添加单次特定超武
TriggerActionType.Add One-Time Special Weapon.Description=为触发所属方添加单次特定超武使用机会。在这里设置的核弹可以发射。
TriggerActionType.Add Repeating Special Weapon.Name=添加永久特定超武
TriggerActionType.Add Repeating Special Weapon.Description=为触发所属方添加永久的特定超武。在这里设置的核弹无法正常发射。
TriggerActionType.Preferred Target.Name=超武首选目标为特定建筑
TriggerActionType.Preferred Target.Description=指定触发所属方的 电脑玩家 使用超武攻击时的首选目标，参数为[BuildingTypes]里的ID。只对打击性超武（如核弹、闪电，Ares对应SW.AITargeting=Offensive）有效。
TriggerActionType.All Change House.Name=全部更改所属
TriggerActionType.All Change House.Description=触发所属方的所有对象更改所属到特定所属方。
TriggerActionType.Make Ally.Name=结盟
TriggerActionType.Make Ally.Description=使触发所属方与特定所属方双向结盟，可能会导致卡顿。共享视野可能会延迟刷新。若多人任务中有至少两个玩家选与触发所属方相同的国家，则只选一个参与结盟。
TriggerActionType.Make Enemy.Name=宣战
TriggerActionType.Make Enemy.Description=使触发所属方与特定所属方双向宣战。
TriggerActionType.Change Zoom Level.Name=-更改缩放等级（无效）
TriggerActionType.Change Zoom Level.Description=更改玩家雷达小地图的缩放等级。使用 1 为超常视野，2 为缩小视野。
TriggerActionType.Resize Player View.Name=调整玩家视野大小
TriggerActionType.Resize Player View.Description=调整玩家在地图内的矩形视野。格式：左%1上%1宽%1高，其中左、上决定左上角位置，宽、高决定宽度和高度。
TriggerActionType.Resize Player View.Parameter2.NameOverride=左
TriggerActionType.Resize Player View.Parameter3.NameOverride=上
TriggerActionType.Resize Player View.Parameter4.NameOverride=宽
TriggerActionType.Resize Player View.Parameter5.NameOverride=高
TriggerActionType.Play Anim at.Name=在路径点播放动画
TriggerActionType.Play Anim at.Description=在特定的路径点播放特定的动画，参数为[Animations]里的动画ID。参数3为动画是否为非惰性（正常播放声音、造成伤害等）。
TriggerActionType.Do Explosion at.Name=在路径点引爆弹头
TriggerActionType.Do Explosion at.Description=使用特定「武器的弹头」在指定路径点产生一次爆炸，但无法触发弹头的特殊效果。参数为游戏内部[WeaponTypes]里的武器ID（从0开始），若无该注册表（或者注册表里没有所填ID）则取[Warheads]里的弹头ID。
TriggerActionType.Create VoxelAnim at.Name=在路径点播放Voxel动画
TriggerActionType.Create VoxelAnim at.Description=在指定路径点播放VXL动画，参数为Rules(md).ini中[VoxelAnims]里的ID（从0开始）。也会播放陨石风暴接近的EVA。
TriggerActionType.Ion Storm Start.Name=离子风暴开始(无效)
TriggerActionType.Ion Storm Start.Description=启动离子风暴，持续特定的帧数。
TriggerActionType.Ion Storm Stop.Name=离子风暴结束(无效)
TriggerActionType.Ion Storm Stop.Description=结束进行中的离子风暴。
TriggerActionType.Lock Input.Name=禁止玩家操作
TriggerActionType.Lock Input.Description=禁止玩家进行操作，失去鼠标无法控制。
TriggerActionType.Unlock Input.Name=允许玩家操作
TriggerActionType.Unlock Input.Description=允许玩家进行操作，取消动作46的效果
TriggerActionType.Center Camera at Waypoint.Name=移动并居中视野到路径点
TriggerActionType.Center Camera at Waypoint.Description=将玩家视野移动到特定的路径点。速度取0～4，太大会造成卡屏，无法移动视野。
TriggerActionType.Center Camera at Waypoint.Parameter1.NameOverride=镜头速度 (0-4)
TriggerActionType.Center Camera at Waypoint.Parameter1.PresentOption0=0 非常慢
TriggerActionType.Center Camera at Waypoint.Parameter1.PresentOption1=1 慢
TriggerActionType.Center Camera at Waypoint.Parameter1.PresentOption2=2 中等
TriggerActionType.Center Camera at Waypoint.Parameter1.PresentOption3=3 快
TriggerActionType.Center Camera at Waypoint.Parameter1.PresentOption4=4 非常快
TriggerActionType.Zoom In.Name=放大视野
TriggerActionType.Zoom In.Description=放大玩家视野。减少分辨率，同时不能输入。
TriggerActionType.Zoom Out.Name=缩小视野
TriggerActionType.Zoom Out.Description=缩小玩家视野。可以取消49放大视野的作用，增加分辨率，恢复输入。
TriggerActionType.Reshroud Map.Name=重置全地图黑幕
TriggerActionType.Reshroud Map.Description=触发所属方将会被重置整张地图的黑幕。联机使用容易RE(重新连线错误)。
TriggerActionType.Change Spotlight Behavior.Name=更改探照灯行为
TriggerActionType.Change Spotlight Behavior.Description=更改与该触发关联的探照灯建筑的照明行为。0=无, 1=遵循Rules(md).ini设置, 2=圆圈, 3=跟随敌对目标。
TriggerActionType.Enable Trigger.Name=启用触发
TriggerActionType.Enable Trigger.Description=启用目标触发。
TriggerActionType.Disable Trigger.Name=禁用触发
TriggerActionType.Disable Trigger.Description=禁用目标触发。
TriggerActionType.Create Radar Event.Name=建立雷达事件
TriggerActionType.Create Radar Event.Description=在特定的路径点建立雷达小地图事件。 0=红框-如果已存在不会创建, 1=绿框, 2=绿框, 3=红框, 4=与0相同, 5=黄框-如果已存在不会创建, 6=黄框-永久显示在小地图上
TriggerActionType.Create Radar Event.Parameter1.PresentOption0=0 红框 - 仅1个
TriggerActionType.Create Radar Event.Parameter1.PresentOption1=1 绿框
TriggerActionType.Create Radar Event.Parameter1.PresentOption2=2 绿框
TriggerActionType.Create Radar Event.Parameter1.PresentOption3=3 红框
TriggerActionType.Create Radar Event.Parameter1.PresentOption4=4 红框 - 仅1个
TriggerActionType.Create Radar Event.Parameter1.PresentOption5=5 黄框 - 仅1个
TriggerActionType.Create Radar Event.Parameter1.PresentOption6=6 - 黄框 - 永久
TriggerActionType.Local Set.Name=设置局部变量
TriggerActionType.Local Set.Description=设置局部变量标记(1)。局部变量可以是'on/set/true'或'off/clear/false'。
TriggerActionType.Local Clear.Name=清除局部变量
TriggerActionType.Local Clear.Description=清除局部变量标记(0)。局部变量可以是'on/set/true'或'off/clear/false'。
TriggerActionType.Meteor Shower At.Name=在路径点流星雨
TriggerActionType.Meteor Shower At.Description=在特定的路径点建立一个流星雨事件。此触发会导致FE(致命错误)。
TriggerActionType.Meteor Shower At.Parameter1.NameOverride=流星雨规模 (0-3)
TriggerActionType.Meteor Shower At.Parameter1.PresentOption0=0 小
TriggerActionType.Meteor Shower At.Parameter1.PresentOption1=1 中
TriggerActionType.Meteor Shower At.Parameter1.PresentOption2=2 大
TriggerActionType.Meteor Shower At.Parameter1.PresentOption3=3 巨
TriggerActionType.Reduce Ore At.Name=在路径点减少矿石
TriggerActionType.Reduce Ore At.Description=减少特定的路径点周围的矿石。
TriggerActionType.Sell Building.Name=变卖关联建筑
TriggerActionType.Sell Building.Description=变卖所有与此触发关联的建筑。
TriggerActionType.Turn Off Building.Name=关闭关联建筑
TriggerActionType.Turn Off Building.Description=关闭与此触发关联的建筑。效果与建筑中耗能=0相同。
TriggerActionType.Turn On Building.Name=启动关联建筑
TriggerActionType.Turn On Building.Description=启动与此触发关联的建筑。效果与建筑中耗能=1相同。
TriggerActionType.Apply 100 Damage at.Name=在路径点造成100点伤害
TriggerActionType.Apply 100 Damage at.Description=在特定的路径点对陆地车辆与飞行器造成100点爆炸伤害，对建筑造成500点伤害，无法对步兵造成伤害，可以摧毁桥梁。伤害数值会受到防御减免，但不受护甲影响。
TriggerActionType.Light Flash (Small) at.Name=在路径点闪烁(小型)
TriggerActionType.Light Flash (Small) at.Description=在指定地点显示一个小型的闪烁。
TriggerActionType.Light Flash (Medium) at.Name=在路径点闪烁(中型)
TriggerActionType.Light Flash (Medium) at.Description=在指定地点显示一个中型的闪烁。
TriggerActionType.Light Flash (Large) at.Name=在路径点闪烁(大型)
TriggerActionType.Light Flash (Large) at.Description=在指定地点显示一个大型的闪烁。
TriggerActionType.Announce Win.Name=宣告胜利
TriggerActionType.Announce Win.Description=宣告玩家胜利。但不会显示“任务完成”的图片。
TriggerActionType.Announce Lose.Name=宣告失败
TriggerActionType.Announce Lose.Description=宣告玩家失败。但不会显示“任务失败”的图片。
TriggerActionType.Force End.Name=强制结束任务
TriggerActionType.Force End.Description=强制结束游戏任务。会显示“任务完成”的图片。
TriggerActionType.Destroy Tag.Name=摧毁标签
TriggerActionType.Destroy Tag.Description=摧毁特定的标签和所有与之关联的触发。只有一开始就存在的标签可以被摧毁，由小队创建的标签被摧毁会弹框。
TriggerActionType.Set Ambient Step.Name=设置环境照明变化幅度
TriggerActionType.Set Ambient Step.Description=设置环境照明变化幅度，即环境照明(亮度)每次发生改变的值。(通常范围0.05~0.1)
TriggerActionType.Set Ambient Rate.Name=设置环境照明变化速率
TriggerActionType.Set Ambient Rate.Description=设置环境照明变化速率，即每秒环境照明(亮度)可以改变多少次。(通常范围0.3~0.8)
TriggerActionType.Set Ambient Light.Name=设置环境照明
TriggerActionType.Set Ambient Light.Description=用新的环境照明(亮度)替代原环境照明，需要一定时间(取决于变化幅度*变化速率)来完成改变。使用一个整数(0～100)代表光照设置里的(0.01～1)。
TriggerActionType.AI Triggers Begin.Name=AI触发开始
TriggerActionType.AI Triggers Begin.Description=启动特定所属方的AI触发。
TriggerActionType.AI Triggers Stop.Name=AI触发停止
TriggerActionType.AI Triggers Stop.Description=停止特定所属方的AI触发。
TriggerActionType.Ratio of AI Trigger Teams.Name=AI触发作战小队比例
TriggerActionType.Ratio of AI Trigger Teams.Description=电脑玩家每次生产AI触发作战小队时成功的概率。(100 = 一定成功，0 = 一定失败，默认 = 100)
TriggerActionType.Ratio of Team Aircraft.Name=飞行器作战小队比例(无效)
TriggerActionType.Ratio of Team Aircraft.Description=电脑玩家为作战小队创建的战机(不包括Jumpjet直升机)的百分比。(100=全为战机小队，0=全为随机小队)
TriggerActionType.Ratio of Team Infantry.Name=步兵作战小队比例(无效)
TriggerActionType.Ratio of Team Infantry.Description=电脑玩家为作战小队创建的步兵的百分比。(100=全为步兵小队，0=全为随机小队)
TriggerActionType.Ratio of Team Units.Name=车辆作战小队比例(无效)
TriggerActionType.Ratio of Team Units.Description=电脑玩家为作战小队创建的载具(包括直升机)的百分比。(100=全为载具小队，0=全为随机小队)
TriggerActionType.Reinforcement At Waypoint.Name=援军(作战小队)[在路径点]
TriggerActionType.Reinforcement At Waypoint.Description=在特定的路径点创建援军作战小队。小队成员会被直接重叠刷出，刷兵路径点为行为设置中的路径点。
TriggerActionType.Wakeup Self.Name=唤醒自身
TriggerActionType.Wakeup Self.Description=唤醒「关联」的睡眠(Sleep)或无害(Harmless)的单位，让他们进入固守(Guard)状态。
TriggerActionType.Wake up All Sleepers.Name=唤醒所有睡眠的单位
TriggerActionType.Wake up All Sleepers.Description=唤醒所有*「非」触发所属方*睡眠(Sleep)单位，让他们进入固守(Guard)状态。
TriggerActionType.Wake up All Harmless.Name=唤醒所有无害的单位
TriggerActionType.Wake up All Harmless.Description=唤醒所有*触发所属方*的无害(Harmless)单位，让他们进入固守(Guard)状态。
TriggerActionType.Wake up Group.Name=唤醒某小组单位
TriggerActionType.Wake up Group.Description=唤醒触发所属方特定小组的所有单位，由单位或特遣部队的Group=来进行判定。
TriggerActionType.Vein Growth.Name=静脉生长
TriggerActionType.Vein Growth.Description=控制静脉是否生长。(仍需要静脉孔怪物)
TriggerActionType.Ore Growth.Name=矿石生长
TriggerActionType.Ore Growth.Description=控制矿石是否生长。
TriggerActionType.Ice Growth.Name=-冰层延伸(无效)
TriggerActionType.Ice Growth.Description=控制结冰面积是否增长。
TriggerActionType.ParticleSystem Anim at.Name=在路径点播放粒子动画
TriggerActionType.ParticleSystem Anim at.Description=在特定的路径点播放粒子动画，参数为[ParticleSystems]里的ID。无法播放Gas类型 (BehavesLike=Gas) 的粒子系统。
TriggerActionType.Remove ParticleSystem Anim at.Name=删除路径点粒子动画
TriggerActionType.Remove ParticleSystem Anim at.Description=删除特定路径点的粒子动画。
TriggerActionType.Lightning Strike at.Name=闪电打击(无效)
TriggerActionType.Lightning Strike at.Description=在特定路径点发动一次闪电打击。
TriggerActionType.Go Berzerk.Name=狂暴化(无效)
TriggerActionType.Go Berzerk.Description=关联的对象(半机械人，Cyborg=yes类步兵)会暴走。
TriggerActionType.Activate Firestorm Defense.Name=启动火风暴围墙
TriggerActionType.Activate Firestorm Defense.Description=启动特定所属方的火风暴围墙(无视火风暴超武挂的建筑和电力)。
TriggerActionType.Deactivate Firestorm Defense.Name=关闭火风暴围墙
TriggerActionType.Deactivate Firestorm Defense.Description=关闭特定所属方的火风暴围墙(无视火风暴超武挂的建筑和电力)。
TriggerActionType.Ion Cannon Strike.Name=声波脉冲打击
TriggerActionType.Ion Cannon Strike.Description=在特定的路径点实施声波脉打击。使用[CombatDamage]中的IonCannonWarhead= 和 IonCannonDamage=。
TriggerActionType.Nuke Strike.Name=核弹打击路径点
TriggerActionType.Nuke Strike.Description=在特定的路径点实施核弹打击，核弹会从离路径点最近的上边缘出现，显示玩家所属色。
TriggerActionType.Chemical Missile Strike.Name=化学导弹打击(无效)
TriggerActionType.Chemical Missile Strike.Description=在特定的路径点实施化学导弹打击。
TriggerActionType.Toggle Train Cargo.Name=切换货物火车状态(无效)
TriggerActionType.Toggle Train Cargo.Description=切换卸载货物的火车的状态。
TriggerActionType.Play Sound Effect (Random).Name=播放音效在(随机路径点)
TriggerActionType.Play Sound Effect (Random).Description=在随机的路径点播放指定的音效。音效在Sound(md).ini中定义。原版_Amb开头的音效自带随机重复，而其他音效只会播放一次。
TriggerActionType.Play Sound Effect at Waypoint.Name=在路径点播放音效
TriggerActionType.Play Sound Effect at Waypoint.Description=在指定的路径点播放指定的音效。音效在Sound(md).ini中定义。原版_Amb开头的音效自带随机重复，而其他音效只会播放一次。
TriggerActionType.Play Ingame Movie.Name=在小地图窗口播放影片
TriggerActionType.Play Ingame Movie.Description=在游戏内(小地图窗口)播放指定的影片。玩家仍能控制界面和单位。
TriggerActionType.Flash Team.Name=闪烁作战小队
TriggerActionType.Flash Team.Description=闪烁特定的作战小队，持续一定的帧数(游戏中1秒=15帧)。
TriggerActionType.Reshroud Map at.Name=重置路径点黑幕
TriggerActionType.Reshroud Map at.Description=用黑幕覆盖特定的路径点。
TriggerActionType.Lightning Storm Strike.Name=闪电风暴打击路径点
TriggerActionType.Lightning Storm Strike.Description=触发所属方会在特定的路径点实施闪电风暴打击，也有关闭敌对所属方小地图的效果。
TriggerActionType.Talk Bubble.Name=对话气泡
TriggerActionType.Talk Bubble.Description=在特定作战小队的第一个实例的第一个成员上显示对话气泡，会揭示小队单位所在单元格的黑幕。1=星号(*)，2=问号(?)，3=感叹号(!)。
TriggerActionType.Talk Bubble.Parameter6.NameOverride=持续帧数
TriggerActionType.Timer Text.Name=计时器文本
TriggerActionType.Timer Text.Description=指定计时器显示的文本，参数为CSF文件内的项目。
TriggerActionType.Set Object Tech Level.Name=设置科技等级
TriggerActionType.Set Object Tech Level.Description=设置特定的科技类型到特定的科技等级。只有1～10是可建造的，负数等级的建筑AI可造而玩家不能，11及以上等级的建筑AI和玩家均不可造。
TriggerActionType.Reinforcement by Chrono.Name=在路径点超时空传送援军
TriggerActionType.Reinforcement by Chrono.Description=在特定的路径点创建援军作战小队，并播放传送动画。小队成员会凭空分散刷出。
TriggerActionType.Create Crate.Name=创建升级工具箱
TriggerActionType.Create Crate.Description=在指定路径点创建一个指定内容的升级工具箱。
TriggerActionType.Create Crate.Parameter1.PresentOption0=0 钱
TriggerActionType.Create Crate.Parameter1.PresentOption1=1 单位
TriggerActionType.Create Crate.Parameter1.PresentOption2=2 医疗
TriggerActionType.Create Crate.Parameter1.PresentOption3=3 隐形
TriggerActionType.Create Crate.Parameter1.PresentOption4=4 爆炸
TriggerActionType.Create Crate.Parameter1.PresentOption5=5 燃烧
TriggerActionType.Create Crate.Parameter1.PresentOption6=6 金钱（损坏）
TriggerActionType.Create Crate.Parameter1.PresentOption7=7 重置黑幕
TriggerActionType.Create Crate.Parameter1.PresentOption8=8 卫星全图
TriggerActionType.Create Crate.Parameter1.PresentOption9=9 防御强化
TriggerActionType.Create Crate.Parameter1.PresentOption10=10 速度强化
TriggerActionType.Create Crate.Parameter1.PresentOption11=11 火力强化
TriggerActionType.Create Crate.Parameter1.PresentOption12=12 一次核弹使用
TriggerActionType.Create Crate.Parameter1.PresentOption13=13 无敌（无效）
TriggerActionType.Create Crate.Parameter1.PresentOption14=14 升星
TriggerActionType.Create Crate.Parameter1.PresentOption15=15 离子风暴（无效）
TriggerActionType.Create Crate.Parameter1.PresentOption16=16 毒气
TriggerActionType.Create Crate.Parameter1.PresentOption17=17 一片矿
TriggerActionType.Create Crate.Parameter1.PresentOption18=18 空降仓（无效）
TriggerActionType.Iron Curtain at.Name=铁幕路径点
TriggerActionType.Iron Curtain at.Description=铁幕作用于特定的路径点，这种铁幕可以杀死步兵并会对所有所属方生效。
TriggerActionType.Pause Game.Name=暂停游戏...秒
TriggerActionType.Pause Game.Description=使游戏暂停特定的秒数。
TriggerActionType.Evict Occupiers.Name=驱逐驻军
TriggerActionType.Evict Occupiers.Description=驱逐出关联建筑物内的驻军。
TriggerActionType.Center (Jump) Camera at Waypoint.Name=跳转并居中视野到路径点
TriggerActionType.Center (Jump) Camera at Waypoint.Description=立即将指挥视野移动到特定的路径点。
TriggerActionType.Make House Cheer.Name=欢呼
TriggerActionType.Make House Cheer.Description=让特定所属方的所有空闲的步兵单位执行欢呼动作。
TriggerActionType.Set Sidebar Tab.Name=设置建造栏到
TriggerActionType.Set Sidebar Tab.Description=强制使建造栏跳转到指定的界面(0-3)。
TriggerActionType.Flash Cameo.Name=闪烁图标
TriggerActionType.Flash Cameo.Description=闪烁建造栏中指定类型的图标，持续一定帧数（游戏中1秒=15帧）。数值一般填120比较合适。
TriggerActionType.Stop Sounds at.Name=停止路径点音效
TriggerActionType.Stop Sounds at.Description=在特定路径点停止所有触发(98、99号)导致的音效。
TriggerActionType.Play Ingame Movie (Pause Game).Name=在小地图窗口播放影片(游戏暂停)
TriggerActionType.Play Ingame Movie (Pause Game).Description=在游戏内(小地图窗口)播放指定的影片。影片播放时游戏暂停。玩家没有控制权。
TriggerActionType.Clear All Smudges.Name=清除全部污染物
TriggerActionType.Clear All Smudges.Description=删除地图上所有污染物(弹坑、焦土)。
TriggerActionType.Destroy All of.Name=摧毁所属方全部
TriggerActionType.Destroy All of.Description=摧毁特定所属方的所有单位。
TriggerActionType.Destroy All Buildings of.Name=摧毁所属方所有建筑
TriggerActionType.Destroy All Buildings of.Description=摧毁特定所属方的所有建筑。
TriggerActionType.Destroy All Land Units of.Name=摧毁特定所属方所有陆军单位
TriggerActionType.Destroy All Land Units of.Description=摧毁特定所属方的所有陆军单位(包括飞行器，Naval=no的车辆，如遥控坦克)。
TriggerActionType.Destroy All Naval Units of.Name=摧毁特定所属方所有海军单位
TriggerActionType.Destroy All Naval Units of.Description=摧毁特定所属方的所有海军单位(包括Naval=yes的车辆，如两栖运输船，不包括遥控坦克)。
TriggerActionType.Mind Control Base of.Name=心灵控制基地
TriggerActionType.Mind Control Base of.Description=触发所属方会心灵控制特定所属方的所有建筑。
TriggerActionType.Restore Mind Controlled Base to.Name=解除基地的心灵控制
TriggerActionType.Restore Mind Controlled Base to.Description=触发所属方将重新取得被敌方心灵控制的所有建筑的作战控制权，对应123心灵控制基地。
TriggerActionType.Create Building At.Name=将建筑建于路径点
TriggerActionType.Create Building At.Description=触发所属方会在特定路径点获得指定类型的建筑。此行为会试图解决路径点堵塞（清除覆盖物与移动单位），若失败则不会建造。Phobos平台参数3为是否播放建造动画，参数4为AI是否修复。
TriggerActionType.Restore Starting Technos of.Name=将所有单位恢复至初始状态
TriggerActionType.Restore Starting Technos of.Description=特定所属方初始的所有单位会被再创建。会移开单位并清除建筑下的污染。如果建筑和单位被新建筑阻挡则不会生成。会移开单位并清除覆盖物。
TriggerActionType.Chrono Screen Effect for.Name=全屏超时空效果
TriggerActionType.Chrono Screen Effect for.Description=会全屏平铺显示超时空效果(白色漩涡)，持续指定的帧数(游戏中的1秒=15帧)。数值一般为60，太大会导致游戏卡死。
TriggerActionType.Teleport All to.Name=超时空传送所有单位到路径点
TriggerActionType.Teleport All to.Description=触发所属方的所有陆军和步兵会被传送到特定的路径点。处于铁幕状态的单位不会被传送。
TriggerActionType.Set Superweapon Charge.Name=设置超武充能百分比
TriggerActionType.Set Superweapon Charge.Description=触发所属方特定超武的冷却时间会变为特定的百分比。数值为一个整数(0-100)。
TriggerActionType.Restore Starting Buildings of.Name=将建筑恢复至初始状态
TriggerActionType.Restore Starting Buildings of.Description=触发所属方初始的所有建筑会被修复或重建。会移开单位并清除覆盖物。
TriggerActionType.Flash Buildings of Type.Name=闪烁特定类型的建筑
TriggerActionType.Flash Buildings of Type.Description=触发所属方的「所有」特定类型的建筑会闪烁特定的帧数 (游戏中的1秒=15帧)。
TriggerActionType.Superweapon Set Recharge Time.Name=设置超武冷却总时间
TriggerActionType.Superweapon Set Recharge Time.Description=更改超武的充能时间 (单位: 帧，游戏中1秒=15帧)。更改操作将在该超武的 下一次 充能时生效。若这个行为执行时超武已经在充能，则一段时间 (默认值x900－设定帧) 内超武会被点亮且不可用。
TriggerActionType.Superweapon Reset Recharge Time.Name=还原超武冷却总时间
TriggerActionType.Superweapon Reset Recharge Time.Description=将132号设置的时间还原回默认值。还原操作在执行此行为后，该超武的「下一次」充能时才生效。
TriggerActionType.Superweapon Reset.Name=重置超武冷却时间
TriggerActionType.Superweapon Reset.Description=重新开始超级武器计时，效果同间谍渗透进超武建筑。
TriggerActionType.Preferred Target Cell Set.Name=超武首选目标单元格
TriggerActionType.Preferred Target Cell Set.Description=触发所属方的电脑玩家会将以后可选目标的超武以特定的路径点为目标。只对打击类如核弹等超武有效。
TriggerActionType.Preferred Target Cell Clear.Name=清除超武首选目标单元格
TriggerActionType.Preferred Target Cell Clear.Description=触发所属方的电脑玩家会恢复正常的超武目标选择，而不是选择特定路径点。
TriggerActionType.Center Base Cell Set.Name=基地中心(集结点)设置
TriggerActionType.Center Base Cell Set.Description=触发所属方的电脑玩家会认为这个路径点是它基地的中心。动作脚本里'己方基地外集合'将会集合在这个路径点附近。当该电脑的基地节点被阻挡时，也会选择此路径点建造。
TriggerActionType.Center Base Cell Clear.Name=基地中心(集结点)清除
TriggerActionType.Center Base Cell Clear.Description=触发所属方的电脑玩家会恢复正常的计算基地中心的方法，而不是选择特定路径点。
TriggerActionType.Blackout Radar Trigger.Name=暂时中断雷达
TriggerActionType.Blackout Radar Trigger.Description=触发所属方的雷达小地图将被中断，持续指定的帧数(游戏中的1秒=15帧)。
TriggerActionType.Defensive Target Cell Set.Name=设置防御目标
TriggerActionType.Defensive Target Cell Set.Description=触发所属方的电脑玩家会将以后的力场护盾使用在此路径点。
TriggerActionType.Defensive Target Cell Clear.Name=清除防御目标
TriggerActionType.Defensive Target Cell Clear.Description=触发所属方的电脑玩家会恢复力场护盾的使用目标选择，而不是选择特定路径点。
TriggerActionType.Retint Red.Name=重绘红色
TriggerActionType.Retint Red.Description=重绘屏幕红色的比例。采用百分比，比如50代表光照里的0.5。该结果会使物体受到环境照明的影响，但也会破坏局部灯光(Lightpost)。
TriggerActionType.Retint Green.Name=重绘绿色
TriggerActionType.Retint Green.Description=重绘屏幕绿色的比例。采用百分比，比如50代表光照里的0.5。该结果会使物体受到环境照明的影响，但也会破坏局部灯光(Lightpost)。
TriggerActionType.Retint Blue.Name=重绘蓝色
TriggerActionType.Retint Blue.Description=重绘屏幕蓝色的比例。采用百分比，比如50代表光照里的0.5。该结果会使物体受到环境照明的影响，但也会破坏局部灯光(Lightpost)。
TriggerActionType.Jump Camera Home.Name=居中视野到基地
TriggerActionType.Jump Camera Home.Description=将视角中心对准你的主要建造场，和按下“H”键效果相同。
TriggerActionType.Auxiliary Power [Ares].Name=获得额外电力 [Ares]
TriggerActionType.Auxiliary Power [Ares].Description=给特定所属方永久性增加额外的电量，数值可以为负。这个效果被允许多次触发累积计算。
TriggerActionType.Kill Drivers Of [Ares].Name=杀死驾驶员 [Ares]
TriggerActionType.Kill Drivers Of [Ares].Description=杀死 所有「关联载具」的驾驶员（如果可以）。载具会转交给参数指定的所属方（使用-1转交给Special）。
TriggerActionType.Set EVA Voice [Ares].Name=设定 EVA 语音 [Ares]
TriggerActionType.Set EVA Voice [Ares].Description=设置玩家的EVA，数值为EVA的序号。（使用-1可以禁用EVA。）
TriggerActionType.Set Group [Ares].Name=设置分组 [Ares]
TriggerActionType.Set Group [Ares].Description=设置触发这个操作的对象的Group。用于通作战小队和特遣部队重组。

