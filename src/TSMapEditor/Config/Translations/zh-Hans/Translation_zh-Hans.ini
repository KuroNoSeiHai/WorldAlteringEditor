MapScripts.AddMapRevealTrigger.TriggerName=全图触发
MapScripts.AddMapRevealTrigger.Description=此脚本将创建显示全图的触发。继续吗？
MapScripts.CountCreditsOnMap.Description=此脚本将计算所有矿石资金价值。继续吗？
MapScripts.ListUnusedScriptingElements.Description=此脚本将列出所有未使用的元素。@这些无意地元素可能导致bug。继续吗？
MapScripts.CivilianVehiclesSleep.Description=此脚本将使所有属于 "Civilians" 所属方的车辆状态设置为 "Sleep"。继续吗？
MapScripts.RemoveTerrainObjects.Description=此脚本将移除地图上所有地形对象（例如树木）。继续吗？
MapScripts.ApplyAnimatedWaterScript.Description=此脚本将平滑水面。继续吗？

