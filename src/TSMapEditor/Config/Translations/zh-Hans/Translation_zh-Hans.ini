ScriptAction.Idle Anim.Name=进入空闲动画
ScriptAction.Idle Anim.Description=让小队中的步兵单位播放闲置动画。
ScriptAction.Idle Anim.Option0.PresetText=Idle1
ScriptAction.Idle Anim.Option1.PresetText=Idle2
ScriptAction.Load onto Transport.Name=*装载入运输载具
ScriptAction.Load onto Transport.Description=队伍中存在有Passengers位置的运输工具，并且其余单位Size和PhysicalSize满足运输条件时，乘客们进入运输工具。(一个队伍里只能存在1个运输工具)(运输步兵时可以加43,0保证单位装载完毕，运输车辆时不可)
ScriptAction.Spy on Structure at Waypoint.Name=间谍进入路径点的建筑物（无效）
ScriptAction.Spy on Structure at Waypoint.Description=间谍进入路径点的建筑物（废弃脚本）
ScriptAction.Patrol to Waypoint.Name=巡逻至路径点
ScriptAction.Patrol to Waypoint.Description=巡逻途中会按照PatrolScan搜寻附近敌人并与敌人交战。通常用于任务，多了会卡……
ScriptAction.Change Script.Name=更改脚本
ScriptAction.Change Script.Description=变为执行另一个脚本(参数为动作脚本ID，从0开始)。
ScriptAction.Change Team.Name=更改小队
ScriptAction.Change Team.Description=让当前小队成员加入其他作战小队(参数为作战小队ID，从0开始)。
ScriptAction.Panic.Name=恐慌
ScriptAction.Panic.Description=小队中有Fraidycat标签的成员会乱跑,并且播放Panic序列，没有该标签的会卧倒。
ScriptAction.Change House.Name=更改所属方
ScriptAction.Change House.Description=小队成员全部更改为所属方（参数为所属方编号）。
ScriptAction.Scatter.Name=*分散
ScriptAction.Scatter.Description=让部队所有单位分散。
ScriptAction.Afraid & Run to Shroud.Name=进入周围的黑幕
ScriptAction.Afraid & Run to Shroud.Description=让所有单位逃到有黑幕的地方。
ScriptAction.Force Player Loss.Name=强制玩家失败
ScriptAction.Force Player Loss.Description=使玩家失败。
ScriptAction.Play Speech.Name=播放语音
ScriptAction.Play Speech.Description=播放特定的语音文件。
ScriptAction.Play Sound.Name=播放音效
ScriptAction.Play Sound.Description=播放特定的音效文件。
ScriptAction.Play Movie.Name=播放电影
ScriptAction.Play Movie.Description=播放特定的电影文件。
ScriptAction.Play Theme.Name=播放音乐
ScriptAction.Play Theme.Description=播放特定的音乐文件。
ScriptAction.Reduce Tiberium.Name=减少矿石
ScriptAction.Reduce Tiberium.Description=减少小队成员周围的矿石数量。
ScriptAction.Begin Production.Name=开始生产
ScriptAction.Begin Production.Description=任务中用于让所属方AI开始自动生产。
ScriptAction.Fire Sale.Name=变卖并冲锋
ScriptAction.Fire Sale.Description=让AI所属方变卖所有建筑并进行最后总攻。
ScriptAction.Self-Destruct.Name=小队自毁
ScriptAction.Self-Destruct.Description=让该小队所有成员自毁。
ScriptAction.Ion Storm Start.Name=闪电风暴开始（延时）
ScriptAction.Ion Storm Start.Description=经过指定的时间后开始闪电风暴。
ScriptAction.Ion Storm End.Name=闪电风暴结束
ScriptAction.Ion Storm End.Description=使闪电风暴结束。
ScriptAction.Center View on Team.Name=镜头聚焦小队
ScriptAction.Center View on Team.Description=镜头聚焦小队（参数为速度）。
